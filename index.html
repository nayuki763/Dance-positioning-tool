<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダンス位置決めツール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>ダンス位置決めツール</h1>
      <p>メンバーのカラーをドラッグ＆ドロップでステージ配置</p>
    </header>

    <section class="panel">
      <h2>メンバーを追加</h2>
      <form id="memberForm" class="form-row">
        <input id="memberName" type="text" placeholder="名前" required />
        <input id="memberColor" type="color" value="#ff0000" />
        <button type="submit">追加</button>
      </form>
      <label class="switch">
        <input id="toggleNames" type="checkbox" checked />
        <span>アイコン下に名前を表示</span>
      </label>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="panel-header">
          <h2>メンバー一覧</h2>
          <span class="hint">●をドラッグしてステージへ</span>
        </div>
        <div id="memberList" class="member-list"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>ステージ</h2>
          <span class="hint">ドラッグで移動（重ねて配置できます）</span>
        </div>
        <div class="stage-wrap">
          <div class="stage-back-label">後ろ</div>
          <div id="stage" class="stage" droppable="true"></div>
          <div class="stage-front-label">前</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>動画再生</h2>
          <span class="hint">YouTubeから動画を読み込み</span>
        </div>
        <div class="form-row">
          <input id="youtubeUrl" type="text" placeholder="YouTubeのURL（例：https://www.youtube.com/watch?v=...）" />
          <button id="loadVideoBtn">読み込み</button>
          <button id="toggleVideoDisplay">再生バーのみ表示</button>
        </div>
        <div id="videoContainer" class="video-container">
          <div id="youtubePlayer" class="youtube-player"></div>
          <div class="video-controls">
            <div id="progressBar" class="progress-bar-wrapper">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="playback-controls">
              <button id="playBtn" class="play-btn">▶</button>
              <button id="pauseBtn" class="pause-btn">⏸</button>
              <span id="currentTime" class="time-display">0:00</span>
              <span class="time-separator">/</span>
              <span id="duration" class="time-display">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>時間フレーム</h2>
          <span class="hint">曲の秒数毎に立ち位置を保存</span>
        </div>
        <div class="form-row">
          <input id="frameStartMin" type="number" placeholder="開始分" min="0" />
          <span>:</span>
          <input id="frameStartSec" type="number" placeholder="秒" min="0" max="59" />
          <span>～</span>
          <input id="frameEndMin" type="number" placeholder="終了分" min="0" />
          <span>:</span>
          <input id="frameEndSec" type="number" placeholder="秒" min="0" max="59" />
          <input id="frameLyrics" type="text" placeholder="メモ(歌詞など)" />
          <button id="addFrameBtn">フレーム追加</button>
        </div>
        <div id="timeframesList" class="timeframes-list"></div>
      </div>
    </section>

    <section class="panel">
      <div class="form-row">
        <input id="songName" type="text" placeholder="曲名を入力" />
        <button id="saveSong">この曲で保存</button>
        <button id="shareSong">共有リンク作成</button>
      </div>
      <div class="form-row">
        <select id="songSelect"></select>
        <button id="loadSong">読み込み</button>
        <button id="deleteSong" class="danger">削除</button>
      </div>
      <div id="shareLink" class="share-link"></div>
    </section>
  </div>

  <script>
    // ====== データ ======
    const STORAGE_KEY = "dance-layout-v2";
    let members = [];
    let stageItems = [];
    let songs = {};
    let currentSong = "";
    let timeframes = [];

    // ====== DOM ======
    const memberForm = document.getElementById("memberForm");
    const memberNameInput = document.getElementById("memberName");
    const memberColorInput = document.getElementById("memberColor");
    const memberList = document.getElementById("memberList");
    const stage = document.getElementById("stage");
    const toggleNames = document.getElementById("toggleNames");
    const songNameInput = document.getElementById("songName");
    const saveSongBtn = document.getElementById("saveSong");
    const shareSongBtn = document.getElementById("shareSong");
    const songSelect = document.getElementById("songSelect");
    const loadSongBtn = document.getElementById("loadSong");
    const deleteSongBtn = document.getElementById("deleteSong");
    const shareLinkDiv = document.getElementById("shareLink");
    const timeframesList = document.getElementById("timeframesList");
    const frameStartMin = document.getElementById("frameStartMin");
    const frameStartSec = document.getElementById("frameStartSec");
    const frameEndMin = document.getElementById("frameEndMin");
    const frameEndSec = document.getElementById("frameEndSec");
    const frameLyrics = document.getElementById("frameLyrics");
    const addFrameBtn = document.getElementById("addFrameBtn");
    const youtubeUrl = document.getElementById("youtubeUrl");
    const loadVideoBtn = document.getElementById("loadVideoBtn");
    const toggleVideoDisplay = document.getElementById("toggleVideoDisplay");
    const videoContainer = document.getElementById("videoContainer");
    const youtubePlayer = document.getElementById("youtubePlayer");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const currentTimeDisplay = document.getElementById("currentTime");
    const durationDisplay = document.getElementById("duration");
    const progressFill = document.getElementById("progressFill");
    const progressBar = document.getElementById("progressBar");

    let player = null;
    let isPlayerReady = false;
    let videoDisplayMode = true; // true: 動画表示, false: 再生バーのみ
    let isPlaying = false;
    let lastAppliedFrameIndex = -1;

    // ====== ヘルパー ======
    function generateId() {
      return "id-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
    }

    function saveStorage() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ members, stageItems, songs, currentSong, timeframes })
      );
    }

    function loadStorage() {
      const txt = localStorage.getItem(STORAGE_KEY);
      if (!txt) return;
      try {
        const data = JSON.parse(txt);
        members = Array.isArray(data.members) ? data.members : [];
        stageItems = Array.isArray(data.stageItems) ? data.stageItems : [];
        songs = data.songs || {};
        currentSong = data.currentSong || "";
        timeframes = Array.isArray(data.timeframes) ? data.timeframes : [];
      } catch (e) {
        console.warn("読み込み失敗", e);
      }
    }

    function updateSongSelect() {
      songSelect.innerHTML = "";
      const names = Object.keys(songs).sort();
      if (names.length === 0) {
        songSelect.innerHTML = '<option value="">保存なし</option>';
        return;
      }
      names.forEach((name) => {
        const o = document.createElement("option");
        o.value = name;
        o.textContent = name;
        if (name === currentSong) o.selected = true;
        songSelect.appendChild(o);
      });
    }

    function renderMembers() {
      memberList.innerHTML = "";
      members.forEach((m) => {
        const row = document.createElement("div");
        row.className = "member-row";
        const dot = document.createElement("div");
        dot.className = "member-dot";
        dot.style.backgroundColor = m.color;
        dot.draggable = true;
        dot.dataset.memberId = m.id;
        dot.title = `${m.name} (${m.color})`;

        dot.addEventListener("dragstart", (ev) => {
          ev.dataTransfer.setData(
            "application/json",
            JSON.stringify({ type: "member", memberId: m.id })
          );
        });

        const label = document.createElement("span");
        label.textContent = m.name;
        
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "member-delete-btn";
        deleteBtn.textContent = "✕";
        deleteBtn.type = "button";
        deleteBtn.title = "メンバーを削除";
        deleteBtn.addEventListener("click", () => {
          members = members.filter((x) => x.id !== m.id);
          stageItems = stageItems.filter((x) => x.memberId !== m.id);
          renderMembers();
          renderStage();
          saveStorage();
        });
        
        row.appendChild(dot);
        row.appendChild(label);
        row.appendChild(deleteBtn);
        memberList.appendChild(row);
      });
    }

    function renderStage(animate = false) {
      const previousPositions = new Map();
      if (animate) {
        stage.querySelectorAll(".stage-item").forEach((el) => {
          const id = el.dataset.stageId;
          if (!id) return;
          previousPositions.set(id, {
            left: parseFloat(el.style.left) || 0,
            top: parseFloat(el.style.top) || 0,
          });
        });
      }

      stage.innerHTML = "";
      // y座標でソート（上が前に見えるようにz-indexを設定）
      const sorted = [...stageItems].sort((a, b) => a.y - b.y);
      sorted.forEach((item, index) => {
        const el = document.createElement("div");
        el.className = "stage-item";
        if (!animate) {
          el.classList.add("no-transition");
        }
        el.style.left = `${item.x}px`;
        el.style.top = `${item.y}px`;
        el.style.backgroundColor = item.color;
        el.style.zIndex = index; // y座標が小さいほど高いz-indexになる
        el.draggable = true;
        el.dataset.stageId = item.id;

        if (animate) {
          const prev = previousPositions.get(item.id);
          if (prev) {
            const dx = prev.left - item.x;
            const dy = prev.top - item.y;
            if (dx !== 0 || dy !== 0) {
              el.style.transform = `translate(${dx}px, ${dy}px)`;
            }
          }
        }

        el.addEventListener("dragstart", (ev) => {
          ev.dataTransfer.setData(
            "application/json",
            JSON.stringify({ type: "stage", id: item.id })
          );
        });
        el.addEventListener("dragover", (ev) => {
          ev.preventDefault();
        });
        el.addEventListener("drop", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          handleStageDrop(ev);
        });

        const name = document.createElement("div");
        name.className = "stage-label";
        name.textContent = item.name;
        name.style.display = toggleNames.checked ? "block" : "none";

        const deleteBtn = document.createElement("div");
        deleteBtn.className = "stage-delete-btn";
        deleteBtn.textContent = "×";
        deleteBtn.title = "削除（ダブルクリックでも削除可）";
        deleteBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          stageItems = stageItems.filter((v) => v.id !== item.id);
          saveStorage();
          renderStage();
        });

        el.appendChild(name);
        el.appendChild(deleteBtn);

        el.addEventListener("dblclick", () => {
          stageItems = stageItems.filter((v) => v.id !== item.id);
          saveStorage();
          renderStage();
        });

        stage.appendChild(el);

        if (animate && el.style.transform) {
          requestAnimationFrame(() => {
            el.style.transform = "translate(0, 0)";
          });
        }
      });
    }

    function renderTimeframes() {
      timeframesList.innerHTML = "";
      if (timeframes.length === 0) {
        timeframesList.innerHTML = '<div class="empty-msg">フレームはまだありません</div>';
        return;
      }
      timeframes.forEach((frame, idx) => {
        const frameBtn = document.createElement("button");
        frameBtn.type = "button";
        frameBtn.className = "timeframe-btn";
        frameBtn.textContent = `${String(Math.floor(frame.startTime / 60)).padStart(2, "0")}:${String(frame.startTime % 60).padStart(2, "0")} ～ ${String(Math.floor(frame.endTime / 60)).padStart(2, "0")}:${String(frame.endTime % 60).padStart(2, "0")}  ${frame.lyrics}`;
        frameBtn.addEventListener("click", () => {
          stageItems = frame.stageItems.map((x) => ({ ...x }));
          renderStage(true);
        });

        const deleteFrameBtn = document.createElement("button");
        deleteFrameBtn.type = "button";
        deleteFrameBtn.className = "timeframe-delete-btn";
        deleteFrameBtn.textContent = "✕";
        deleteFrameBtn.addEventListener("click", () => {
          timeframes = timeframes.filter((_, i) => i !== idx);
          renderTimeframes();
          saveStorage();
        });

        const frameRow = document.createElement("div");
        frameRow.className = "timeframe-row";
        frameRow.appendChild(frameBtn);
        frameRow.appendChild(deleteFrameBtn);
        timeframesList.appendChild(frameRow);
      });
    }

    function extractYoutubeVideoId(url) {
      const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
      const match = url.match(regex);
      return match ? match[1] : null;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function applyFrameAtTime(currentTime) {
      const frameIndex = timeframes.findIndex(
        (f) => currentTime >= f.startTime && currentTime < f.endTime
      );

      if (frameIndex !== -1 && frameIndex !== lastAppliedFrameIndex) {
        lastAppliedFrameIndex = frameIndex;
        stageItems = timeframes[frameIndex].stageItems.map((x) => ({ ...x }));
        renderStage(true); // animate = true
      } else if (frameIndex === -1 && lastAppliedFrameIndex !== -1) {
        lastAppliedFrameIndex = -1;
      }
    }

    function onYouTubeIframeAPIReady() {
      // This function is called by YouTube API when it loads
    }

    function setVideoVisibility(show) {
      const iframe = player && typeof player.getIframe === "function" ? player.getIframe() : null;
      const target = iframe || youtubePlayer;
      if (!target) return;
      target.style.display = show ? "block" : "none";
    }

    function initializePlayer(videoId) {
      if (player) {
        player.destroy();
      }

      videoDisplayMode = true;
      toggleVideoDisplay.textContent = "再生バーのみ表示";
      setVideoVisibility(true);

      player = new YT.Player(youtubePlayer, {
        height: "320",
        width: "100%",
        videoId: videoId,
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
        },
      });
    }

    function onPlayerReady(event) {
      isPlayerReady = true;
      durationDisplay.textContent = formatTime(player.getDuration());
      setVideoVisibility(videoDisplayMode);
      startTimeUpdate();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        isPlaying = true;
      } else if (event.data === YT.PlayerState.PAUSED) {
        isPlaying = false;
      }
    }

    function startTimeUpdate() {
      setInterval(() => {
        if (isPlayerReady && player && typeof player.getCurrentTime === "function") {
          const currentTime = player.getCurrentTime();
          currentTimeDisplay.textContent = formatTime(currentTime);
          const duration = player.getDuration();
          if (duration > 0) {
            const percent = (currentTime / duration) * 100;
            progressFill.style.width = percent + "%";
          }
          applyFrameAtTime(currentTime);
        }
      }, 100);
    }

    function getRelativePos(container, clientX, clientY) {
      const rect = container.getBoundingClientRect();
      const x = clientX - rect.left - 16;
      const y = clientY - rect.top - 16;
      return {
        x: Math.max(0, Math.min(x, rect.width - 32)),
        y: Math.max(0, Math.min(y, rect.height - 32)),
      };
    }

    function setShareHash(song) {
      if (!song) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
        return;
      }
      const encoded = encodeURIComponent(song);
      location.hash = `song=${encoded}`;
    }

    function parseHash() {
      const h = location.hash.replace(/^#/, "");
      if (!h) return null;
      const m = h.match(/song=([^&]+)/);
      if (!m) return null;
      return decodeURIComponent(m[1]);
    }

    // ====== イベント ======
    memberForm.addEventListener("submit", (ev) => {
      ev.preventDefault();
      const name = memberNameInput.value.trim();
      const color = memberColorInput.value;
      if (!name) return;
      members.push({ id: generateId(), name, color });
      memberNameInput.value = "";
      renderMembers();
      saveStorage();
    });

    toggleNames.addEventListener("change", () => {
      renderStage();
      saveStorage();
    });

    addFrameBtn.addEventListener("click", () => {
      const startMin = parseInt(frameStartMin.value) || 0;
      const startSec = parseInt(frameStartSec.value) || 0;
      const endMin = parseInt(frameEndMin.value) || 0;
      const endSec = parseInt(frameEndSec.value) || 0;
      const lyrics = frameLyrics.value.trim();

      const startTime = startMin * 60 + startSec;
      const endTime = endMin * 60 + endSec;

      if (startTime >= endTime) {
        alert("開始時刻は終了時刻より前にしてください。");
        return;
      }

      timeframes.push({
        startTime,
        endTime,
        lyrics,
        stageItems: stageItems.map((x) => ({ ...x })),
      });

      frameStartMin.value = "";
      frameStartSec.value = "";
      frameEndMin.value = "";
      frameEndSec.value = "";
      frameLyrics.value = "";

      renderTimeframes();
      saveStorage();
    });

    loadVideoBtn.addEventListener("click", () => {
      const url = youtubeUrl.value.trim();
      if (!url) {
        alert("YouTubeのURLを入力してください。");
        return;
      }
      const videoId = extractYoutubeVideoId(url);
      if (!videoId) {
        alert("有効なYouTubeのURLではありません。");
        return;
      }
      youtubeUrl.value = "";
      initializePlayer(videoId);
    });

    playBtn.addEventListener("click", () => {
      if (isPlayerReady && player) {
        player.playVideo();
      }
    });

    pauseBtn.addEventListener("click", () => {
      if (isPlayerReady && player) {
        player.pauseVideo();
      }
    });

    toggleVideoDisplay.addEventListener("click", () => {
      videoDisplayMode = !videoDisplayMode;
      setVideoVisibility(videoDisplayMode);
      toggleVideoDisplay.textContent = videoDisplayMode ? "再生バーのみ表示" : "動画を表示";
    });

    progressBar.addEventListener("click", (ev) => {
      if (!isPlayerReady || !player) return;
      const rect = progressBar.getBoundingClientRect();
      const percent = (ev.clientX - rect.left) / rect.width;
      const duration = player.getDuration();
      player.seekTo(percent * duration);
    });

    stage.addEventListener("dragover", (ev) => {
      ev.preventDefault();
    });

    function handleStageDrop(ev) {
      const txt = ev.dataTransfer.getData("application/json");
      if (!txt) return;
      const data = JSON.parse(txt);
      const pos = getRelativePos(stage, ev.clientX, ev.clientY);
      if (data.type === "member") {
        const m = members.find((x) => x.id === data.memberId);
        if (!m) return;
        stageItems.push({
          id: generateId(),
          memberId: m.id,
          name: m.name,
          color: m.color,
          x: pos.x,
          y: pos.y,
        });
      } else if (data.type === "stage") {
        const item = stageItems.find((x) => x.id === data.id);
        if (item) {
          item.x = pos.x;
          item.y = pos.y;
        }
      }
      saveStorage();
      renderStage();
    }

    stage.addEventListener("drop", (ev) => {
      ev.preventDefault();
      handleStageDrop(ev);
    });

    saveSongBtn.addEventListener("click", () => {
      const song = songNameInput.value.trim();
      if (!song) {
        alert("曲名を入力してください。");
        return;
      }
      songs[song] = {
        members,
        stageItems,
        timeframes,
      };
      currentSong = song;
      updateSongSelect();
      setShareHash(song);
      saveStorage();
      alert(`「${song}」を保存しました。`);
    });

    loadSongBtn.addEventListener("click", () => {
      const song = songSelect.value;
      if (!song || !songs[song]) {
        alert("読み込む曲を選んでください。");
        return;
      }
      const s = songs[song];
      members = s.members.map((x) => ({ ...x }));
      stageItems = s.stageItems.map((x) => ({ ...x }));
      timeframes = Array.isArray(s.timeframes) ? s.timeframes.map((x) => ({ ...x })) : [];
      currentSong = song;
      songNameInput.value = song;
      updateSongSelect();
      setShareHash(song);
      renderMembers();
      renderStage();
      renderTimeframes();
      saveStorage();
    });

    deleteSongBtn.addEventListener("click", () => {
      const song = songSelect.value;
      if (!song || !songs[song]) {
        alert("曲を選択してください。");
        return;
      }
      if (!confirm(`「${song}」を削除しますか？`)) return;
      delete songs[song];
      if (currentSong === song) currentSong = "";
      updateSongSelect();
      saveStorage();
      alert("削除しました。");
    });

    shareSongBtn.addEventListener("click", () => {
      const song = songNameInput.value.trim() || currentSong;
      if (!song) {
        alert("曲名をセットしてから共有してください。");
        return;
      }
      setShareHash(song);
      const url = `${location.origin}${location.pathname}#song=${encodeURIComponent(song)}`;
      shareLinkDiv.textContent = "共有リンク: " + url;
      shareLinkDiv.dataset.copy = url;
    });

    shareLinkDiv.addEventListener("click", () => {
      const text = shareLinkDiv.dataset.copy;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        shareLinkDiv.textContent = "リンクをコピーしました。";
      });
    });

    // ====== 初期化 ======
    function init() {
      loadStorage();
      const sharedSong = parseHash();
      if (sharedSong && songs[sharedSong]) {
        currentSong = sharedSong;
        songNameInput.value = sharedSong;
        const s = songs[sharedSong];
        members = s.members.map((x) => ({ ...x }));
        stageItems = s.stageItems.map((x) => ({ ...x }));
        timeframes = Array.isArray(s.timeframes) ? s.timeframes.map((x) => ({ ...x })) : [];
      }

      if (members.length === 0) {
        members = [
          { id: generateId(), name: "A子", color: "#ff6b6b" },
          { id: generateId(), name: "B子", color: "#4d9de0" },
          { id: generateId(), name: "C子", color: "#f9c74f" },
        ];
      }

      updateSongSelect();
      renderMembers();
      renderStage();
      renderTimeframes();
    }

    init();
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
